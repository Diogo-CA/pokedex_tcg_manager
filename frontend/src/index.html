<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIdex</title>

  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons for easy UI indicators -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/global.css">
</head>

<body>

  <div class="pokedex-scene" id="pokedex-scene">
  
    <div id="pokedex-device" class="pokedex-device is-closed">
  
      <div class="pokedex-left-body">
        <div class="pokedex-header">

          <div class="pokedex-big-button" id="pokedex-lens"></div>
          
          <div class="pokedex-leds">
            <div class="pokedex-led red blinking" id="led-red"></div>
            <div class="pokedex-led yellow" id="led-yellow"></div>
            <div class="pokedex-led green" id="led-green"></div>
          </div>
        </div>
  
        <main id="pokedex-screen" class="pokedex-screen p-4 d-flex flex-column justify-content-center">
        </main>

        <div class="pokedex-controls">
          <div class="round-buttons">
            <div class="round-btn black"></div>
            <div class="round-btn yellow"></div>
          </div>
          <div class="d-pad">
            <div class="d-pad-btn center"></div>
            <div class="d-pad-btn up"></div>
            <div class="d-pad-btn down"></div>
            <div class="d-pad-btn left"></div>
            <div class="d-pad-btn right"></div>
          </div>
        </div>
      </div>

      <div class="pokedex-hinge"></div>
  
      <div id="pokedex-lid" class="pokedex-right-lid is-closed">
        <div class="lid-face lid-front d-flex flex-column align-items-center justify-content-center">
          <div class="yellow-triangle"></div>
          <h5 class="text-white mt-4 text-center">Clique na Tampa<br>para Iniciar</h5>
        </div>
        
        <div class="lid-face lid-back p-4">
          <div class="green-mini-screen" id="mini-status-screen">
            Aguardando login...
          </div>
          
          <div class="d-flex justify-content-between align-items-center mt-auto" style="height: 100px;">
            <div style="background-color: #333; width: 60%; height: 60px; border-radius: 6px; border: 2px solid #555; display:grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px;">
              <div style="background-color: #555; border-radius: 2px;"></div>
              <div style="background-color: #555; border-radius: 2px;"></div>
              <div style="background-color: #555; border-radius: 2px;"></div>
              <div style="background-color: #555; border-radius: 2px;"></div>
              <div style="background-color: #555; border-radius: 2px;"></div>
              <div style="background-color: #555; border-radius: 2px;"></div>
            </div>
            <div style="width: 30%; height: 80px; display: flex; flex-direction: column; justify-content: space-between;">
              <div style="background-color: var(--pkdx-yellow); height: 20px; border-radius: 4px; border: 1px solid #999;"></div>
              <div style="background-color: #00BFFF; height: 20px; border-radius: 4px; border: 1px solid #999;"></div>
              <div style="background-color: #32CD32; height: 20px; border-radius: 4px; border: 1px solid #999;"></div>
            </div>
          </div>
        </div>
      </div>
  
    </div>
  </div>

  <!-- Main Layout (Hidden on login) -->
  <div class="main-layout-wrapper" id="main-layout" style="display: none; flex-direction: column; height: 100vh;">
    <!-- Top Navbar -->
    <nav class="top-navbar bg-white d-flex justify-content-between align-items-center px-4 py-2 border-bottom shadow-sm">
      <div class="d-flex align-items-center">
        <div class="logo-circle me-2 d-flex align-items-center justify-content-center text-white bg-danger rounded-circle fw-bold" style="width: 36px; height: 36px; font-size: 1.2rem;">S</div>
        <h5 class="m-0 fw-bold text-dark d-flex align-items-center gap-1">SIdex <span class="fw-normal text-secondary mt-1" style="font-size: 0.7rem; letter-spacing: 1px;">TCG MANAGER</span></h5>
      </div>
      
      <div class="nav custom-nav-tabs d-flex align-items-center" id="main-nav">
        <a class="nav-link active" href="#/dashboard" id="nav-dashboard"><i class="bi bi-house"></i> Início</a>
        <a class="nav-link" href="#/catalog" id="nav-catalog"><i class="bi bi-grid-3x3-gap"></i> Catálogo</a>
        <a class="nav-link" href="#/collection" id="nav-collection"><i class="bi bi-book"></i> Coleção</a>
        <a class="nav-link" href="#/folders" id="nav-folders"><i class="bi bi-star"></i> Binders</a>
        <a class="nav-link" href="#/profile" id="nav-profile"><i class="bi bi-person"></i> Perfil</a>
      </div>

      <div class="d-flex align-items-center gap-3">
        

        <div class="d-flex align-items-center gap-2 ms-2" style="cursor: pointer;" onclick="window.location.hash='#/profile'">
          <div class="rounded-circle bg-danger text-white d-flex align-items-center justify-content-center fw-bold" style="width: 36px; height: 36px; font-size: 0.9rem;">AK</div>
          <div class="d-none d-md-block text-start" style="line-height: 1.1;">
            <div class="fw-bold text-dark" style="font-size: 0.85rem;" id="nav-user-name">Treinador</div>
            <div class="text-secondary" style="font-size: 0.7rem;">Mestre</div>
          </div>
        </div>
        
        <button class="btn btn-sm btn-outline-danger ms-3" id="btn-logout"><i class="bi bi-box-arrow-right"></i> Sair</button>
      </div>
    </nav>
    
    <!-- Main Content Area -->
    <main id="dashboard-content" class="flex-grow-1 overflow-y-auto" style="background-color: #f6f8fa;">
      <!-- Renders active page/view -->
    </main>
  </div>


  <script type="module" src="/dist/app.js"></script>
  <!-- Bootstrap 5 JS Bundle CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
